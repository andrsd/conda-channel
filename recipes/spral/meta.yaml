{% set name = "spral" %}
{% set version = "2024.01.18" %}
{% set build = 0 %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  - url: https://github.com/ralna/spral/archive/refs/tags/v{{ version }}.tar.gz
    sha256: b0dfc71bfad94b5182931b9b913e0adaf1db241b62578839add9749c918fa000
    patches:
      - files/increase_test_timeout.patch

build:
  skip: true  # [win]
  number: {{ build }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('fortran') }}
    - meson
    - ninja
    - pkg-config
    # See https://conda-forge.org/docs/maintainer/knowledge_base.html#openmp
    - libgomp  # [linux]
    - llvm-openmp  # [osx]
  host:
    - blas-devel
    - {{ blas }}
    - {{ cblas }}
    - {{ lapack }}
    - libhwloc
    - zlib
    - metis

outputs:
  - name: libspral
    build:
      skip: true  # [win]

    requirements:
      build:
        - {{ compiler('c') }}
        - {{ compiler('cxx') }}
        - {{ compiler('fortran') }}
      host: []
      run:
        - __osx >={{ MACOSX_DEPLOYMENT_TARGET|default("10.9") }}  # [osx]

    test:
      commands:
        - test -f ${PREFIX}/include/spral.h  # [unix]
        - test -f ${PREFIX}/lib/libspral${SHLIB_EXT}  # [unix]

about:
  home: https://github.com/ralna/spral
  license: BSD-3-Clause
  license_file: LICENCE
  summary: Sparse Parallel Robust Algorithms Library.

extra:
  recipe-maintainers:
    - andrsd
